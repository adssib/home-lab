# akkarilab.xyz — serves the landing page at "/" and reverse-proxies Grafana at "/grafana/".
#
# NOTE: you very likely ALREADY have a working server block for akkarilab.xyz (your /grafana/
# proxy works today). Don't blindly overwrite it — the important NEW piece is the `location /`
# block that serves the landing page. Merge that into your existing config and keep your real
# TLS certificate paths.

# Needed for Grafana's live / websocket features.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name akkarilab.xyz www.akkarilab.xyz;
    # Redirect all plain HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name akkarilab.xyz www.akkarilab.xyz;

    # --- TLS (adjust to your real certs, e.g. from certbot) ---
    ssl_certificate     /etc/letsencrypt/live/akkarilab.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akkarilab.xyz/privkey.pem;

    # --- Landing page (this repo's landing/ folder) ---
    root /var/www/akkarilab;     # or point straight at the repo: /home/<user>/home-lab/landing
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- Grafana (sub-path serving; matches GF_SERVER_ROOT_URL=.../grafana/) ---
    location /grafana/ {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:3001;
    }

    # Grafana live (websockets)
    location /grafana/api/live/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:3001;
    }
}
