# akkarilab.xyz — host-package NGINX, deployed to /etc/nginx/sites-enabled/main.conf. TLS via Certbot.
#
# SOURCE OF TRUTH for the live nginx config. Deploy with:
#   sudo cp /srv/home-lab/nginx/akkarilab.conf /etc/nginx/sites-enabled/main.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# /angular (:4200) and /api (:3000) proxy your other apps — keep them if those services run.

server {
    server_name akkarilab.xyz;

    # Landing page — served straight from the git checkout in /srv
    root /srv/home-lab/landing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /angular {
        proxy_pass http://localhost:4200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /grafana/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host akkarilab.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/akkarilab.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/akkarilab.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = akkarilab.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name akkarilab.xyz;
    return 404; # managed by Certbot
}
