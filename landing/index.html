<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>akkarilab</title>
  <style>
    :root {
      --bg: #0b0e14;
      --bg-soft: #111722;
      --border: #1e2633;
      --text: #e6edf3;
      --muted: #8b98a9;
      --accent: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 50% -10%, #14233b 0%, transparent 60%),
        var(--bg);
    }
    .wrap { width: 100%; max-width: 720px; }
    header { margin-bottom: 2.25rem; text-align: center; }
    .title {
      font-size: clamp(2rem, 6vw, 3.25rem);
      letter-spacing: -0.03em;
      font-weight: 700;
    }
    .title span { color: var(--accent); }
    .status {
      margin-top: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
      100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      background: #131b29;
    }
    .card .icon { font-size: 1.75rem; }
    .card h2 { margin-top: 0.85rem; font-size: 1.15rem; font-weight: 600; }
    .card p { margin-top: 0.35rem; font-size: 0.85rem; color: var(--muted); }
    .card .go { margin-top: 1rem; font-size: 0.8rem; color: var(--accent); }
    .card.coming-soon { opacity: 0.55; pointer-events: none; }
    .card.coming-soon .go { color: var(--muted); }
    footer { margin-top: 2.5rem; text-align: center; font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="title">akkari<span>lab</span></div>
      <div class="status"><span class="dot"></span> home lab &middot; online</div>
    </header>

    <div class="grid">
      <a class="card" href="/grafana/">
        <div class="icon">📊</div>
        <h2>Grafana</h2>
        <p>Live metrics — CPU, memory, disk &amp; network health.</p>
        <div class="go">open dashboard →</div>
      </a>

      <!-- CI/CD: set the real href and remove the "coming-soon" class when the service is live -->
      <a class="card coming-soon" href="#">
        <div class="icon">🔧</div>
        <h2>CI / CD</h2>
        <p>Pipelines &amp; deployments.</p>
        <div class="go">coming soon</div>
      </a>
    </div>

    <footer>akkarilab.xyz &middot; self-hosted</footer>
  </main>
</body>
</html>
